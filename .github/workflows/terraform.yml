name: "AWS EC2 Terraform Deployment"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Run"
    runs-on: ubuntu-latest

    env:
      # PASTE YOUR RAW AWS KEYS DIRECTLY IN THE QUOTES BELOW
      AWS_ACCESS_KEY_ID: "AKIAVNA5C2LZ336FLTMU"
      AWS_SECRET_ACCESS_KEY: "Zm0gcYIcPovUakaLThXAQmJz+hHK7Xiine1peQwE"
      AWS_REGION: "ap-south-1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=terraform9177093193" \
            -backend-config="key=dev/ec2-demo.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
