name: "AWS EC2 Terraform Deployment"

on:
  push:
    branches:
      - main # Triggers the pipeline automatically whenever you push code to the main branch

jobs:
  terraform:
    name: "Terraform Run"
    runs-on: ubuntu-latest

    # This injects the GitHub Secrets you saved in Step 1 directly into the pipeline environment
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ap-south-1" # Your target region (Mumbai)

    steps:
      # Step A: Pulls your code from the GitHub repository onto the runner machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step B: Installs the official, stable HashiCorp Terraform CLI engine binaries
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform-version: "1.5.7"

      # Step C: Initializes the S3 backend dynamically without plugin wrapper bugs
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -backend-config="bucket=terraform9177093193" \
            -backend-config="key=dev/ec2-demo.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      # Step D: Runs a dry-run execution plan to see what resources will be built
      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan

      # Step E: Automatically approves and provisions your EC2 instance into AWS
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve
