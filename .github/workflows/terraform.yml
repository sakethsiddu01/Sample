name: "AWS EC2 Terraform Deployment"

on:
  push:
    branches:
      - main

jobs:
  terraform:
    name: "Terraform Run"
    runs-on: ubuntu-latest

    # GLOBAL CREDENTIALS: Injects your keys into the entire environment automatically
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: "ap-south-1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.7"
          terraform_wrapper: false # FIX: Blocks the wrapper from hiding your AWS credentials!

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=terraform9177093193" \
            -backend-config="key=dev/ec2-demo.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
